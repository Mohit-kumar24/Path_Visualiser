<!doctype html>
<html lang="en">
     <head>
          <meta charset="UTF-8" />
          <meta
               name="viewport"
               content="width=device-width, initial-scale=1.0"
          />
          <title>Pathfinder — Algorithm Visualizer</title>
          <link rel="preconnect" href="https://fonts.googleapis.com" />
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
          <link
               href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap"
               rel="stylesheet"
          />
          <link rel="stylesheet" href="style.css" />
     </head>
     <body>
          <div class="deck">
               <!-- HEADER / SIGNATURE TRACE -->
               <header class="deck__header">
                    <div class="brand">
                         <span class="brand__mark">◈</span>
                         <div class="brand__text">
                              <h1>PATHFINDER</h1>
                              <p>
                                   grid traversal &amp; shortest-path visualizer
                              </p>
                         </div>
                    </div>

                    <svg
                         class="trace"
                         viewBox="0 0 600 60"
                         preserveAspectRatio="none"
                         aria-hidden="true"
                    >
                         <line
                              class="trace__mid"
                              x1="0"
                              y1="30"
                              x2="600"
                              y2="30"
                         />
                         <polyline
                              class="trace__line"
                              id="traceLine"
                              points=""
                         />
                         <circle
                              class="trace__dot"
                              id="traceDot"
                              r="3"
                              cx="0"
                              cy="30"
                         />
                    </svg>

                    <div class="readout">
                         <div class="readout__item">
                              <span class="readout__label">visited</span>
                              <span class="readout__value" id="statVisited"
                                   >0</span
                              >
                         </div>
                         <div class="readout__item">
                              <span class="readout__label">path</span>
                              <span class="readout__value" id="statPath"
                                   >—</span
                              >
                         </div>
                         <div class="readout__item">
                              <span class="readout__label">status</span>
                              <span class="readout__value" id="statStatus"
                                   >idle</span
                              >
                         </div>
                    </div>
               </header>

               <!-- TOOLBAR -->
               <section class="toolbar">
                    <div class="toolbar__group">
                         <label class="toolbar__label" for="algoSelect"
                              >algorithm</label
                         >
                         <select id="algoSelect" class="select">
                              <option value="dijkstra">
                                   Dijkstra's Algorithm
                              </option>
                              <option value="bfs">Breadth-First Search</option>
                              <option value="dfs">Depth-First Search</option>
                              <option value="bibfs">Bidirectional BFS</option>
                         </select>
                    </div>

                    <div class="toolbar__group">
                         <label class="toolbar__label" for="speedSelect"
                              >speed</label
                         >
                         <select id="speedSelect" class="select">
                              <option value="fast">Fast</option>
                              <option value="medium" selected>Medium</option>
                              <option value="slow">Slow</option>
                         </select>
                    </div>

                    <div class="toolbar__actions">
                         <button class="btn btn--primary" id="visualizeBtn">
                              Visualize
                         </button>
                         <button class="btn" id="wallsBtn">Random Walls</button>
                         <button class="btn" id="clearPathBtn">
                              Clear Path
                         </button>
                         <button class="btn btn--ghost" id="clearBoardBtn">
                              Clear Board
                         </button>
                         <button
                              class="btn btn--theme"
                              id="themeBtn"
                              title="Cycle theme"
                         >
                              <span id="themeIcon">◐</span> Theme
                         </button>
                    </div>
               </section>

               <!-- LEGEND -->
               <section class="legend" aria-label="grid legend">
                    <span class="legend__item"
                         ><i class="swatch swatch--start"></i>Start</span
                    >
                    <span class="legend__item"
                         ><i class="swatch swatch--target"></i>Target</span
                    >
                    <span class="legend__item"
                         ><i class="swatch swatch--wall"></i>Wall</span
                    >
                    <span class="legend__item"
                         ><i class="swatch swatch--visited"></i>Visited</span
                    >
                    <span class="legend__item"
                         ><i class="swatch swatch--path"></i>Path</span
                    >
                    <span class="legend__hint"
                         >drag the S / E nodes to move them · click and drag to
                         draw walls</span
                    >
               </section>

               <!-- GRID STAGE -->
               <main class="stage">
                    <div id="grid" class="grid"></div>
               </main>
          </div>

          <script type="module" src="js/main.js"></script>
     </body>
</html>
